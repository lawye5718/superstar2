<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我是大明星 AI - Superstar</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .retro-font { font-family: 'Abril Fatface', cursive; }
        .body-font { font-family: 'Lato', sans-serif; }
        .camera-shutter-anim { animation: flash 0.2s; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0; background-color: white; } 100% { opacity: 1; } }
        .photo-print-enter-active { transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .photo-print-enter-from { transform: translateY(-100px) scale(0.8); opacity: 0; }
        .polaroid { background: white; padding: 1rem 1rem 3rem 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transform: rotate(-2deg); transition: transform 0.3s; }
        .polaroid:hover { transform: rotate(0deg) scale(1.02); z-index: 10; }
        /* 进度条动画 */
        @keyframes progress { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
    </style>
</head>
<body class="bg-stone-100 body-font text-stone-800 h-screen overflow-hidden">

<div id="app" class="h-full flex flex-col">

    <!-- 导航栏 -->
    <nav class="bg-stone-900 text-white p-4 flex justify-between items-center shadow-lg z-50">
        <div class="text-2xl retro-font text-yellow-500 tracking-wider">SUPERSTAR.AI</div>
        <div class="space-x-4 text-sm flex items-center">
            <template v-if="isLoggedIn">
                <button @click="currentView = 'camera'" :class="{'text-yellow-500': currentView === 'camera'}">复古相机</button>
                <button @click="currentView = 'gallery'" :class="{'text-yellow-500': currentView === 'gallery'}">画廊套餐</button>
                <button @click="showUserModal = true" class="hover:text-yellow-200">👤 余额: {{ user.credits }}</button>
                <!-- 隐蔽的管理员入口 -->
                <button v-if="isAdmin" @click="currentView = 'admin'" :class="{'text-red-400': currentView === 'admin'}" class="text-xs text-stone-600 hover:text-red-400 ml-2">Ops</button>
                <button @click="logout" class="hover:text-red-400">退出</button>
            </template>
            <template v-else>
                <button @click="showLoginModal = true" class="px-4 py-2 bg-yellow-500 text-stone-900 rounded-full font-bold hover:bg-yellow-400">登录/注册</button>
            </template>
        </div>
    </nav>

    <!-- 主视图区域 -->
    <main class="flex-grow relative overflow-hidden bg-stone-100">
        
        <!-- 1. 复古相机视图 -->
        <div v-if="currentView === 'camera'" class="h-full flex flex-col items-center justify-center bg-stone-800 relative">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/leather.png')] opacity-30"></div>
            <div class="relative z-10 w-full max-w-md h-[60vh] flex items-center justify-center">
                <transition name="photo-print">
                    <div v-if="currentCameraPhoto" class="polaroid w-64 md:w-80 cursor-grab active:cursor-grabbing">
                        <img :src="currentCameraPhoto.cover_image_url" class="w-full aspect-[3/4] object-cover bg-gray-200">
                        <div class="text-center mt-4 retro-font text-xl text-gray-700">{{ currentCameraPhoto.title }}</div>
                    </div>
                    <div v-else class="text-white text-opacity-50 text-center">
                        <div class="text-6xl mb-4">📷</div>
                        <p>点击快门探索风格</p>
                    </div>
                </transition>
            </div>
            <div class="relative z-20 mt-8 flex flex-col items-center gap-4">
                <button @click="triggerCamera" :disabled="isLoading" class="w-20 h-20 rounded-full bg-red-600 border-4 border-stone-300 shadow-xl active:scale-95 transition-transform flex items-center justify-center">
                    <div class="w-16 h-16 rounded-full border-2 border-red-800 bg-red-500"></div>
                </button>
                <button v-if="currentCameraPhoto" @click="createOrder(currentCameraPhoto)" class="px-8 py-3 bg-yellow-500 text-stone-900 font-bold rounded-full shadow-lg hover:bg-yellow-400 transition-colors animate-bounce">
                    ✨ 我也要同款 ({{ currentCameraPhoto.price }} 积分)
                </button>
            </div>
        </div>

        <!-- 2. 画廊视图 -->
        <div v-if="currentView === 'gallery'" class="h-full overflow-y-auto bg-white p-4">
            <div class="max-w-6xl mx-auto mb-8 sticky top-0 bg-white/90 backdrop-blur z-30 py-4">
                <h2 class="text-3xl retro-font mb-4">Trending Styles</h2>
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button v-for="cat in categories" :key="cat" @click="filterCategory(cat)"
                            class="px-4 py-1 rounded-full border border-stone-300 hover:bg-stone-800 hover:text-white transition-colors"
                            :class="{'bg-stone-800 text-white': activeCategory === cat}">
                        {{ cat }}
                    </button>
                </div>
            </div>
            <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
                <div v-for="tpl in galleryTemplates" :key="tpl.id" class="group relative cursor-pointer overflow-hidden rounded-xl" @click="createOrder(tpl)">
                    <img :src="tpl.cover_image_url" class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">
                        <h3 class="text-white font-bold">{{ tpl.title }}</h3>
                        <p class="text-yellow-400 text-sm">🔥 {{ tpl.usage_count }} 人已生成</p>
                        <button class="mt-2 w-full bg-white text-black py-1 rounded-md text-sm font-bold">做同款</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. 管理员后台 (Admin Ops) -->
        <div v-if="currentView === 'admin'" class="h-full overflow-y-auto bg-stone-100 p-4">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-8">
                <h2 class="text-2xl font-bold mb-6 flex items-center">🛠️ 管理员上架后台</h2>
                
                <div class="space-y-4">
                    <!-- 图片上传 -->
                    <div>
                        <label class="block text-sm font-bold mb-1">1. 样图上传 (Cover Image)</label>
                        <input type="file" @change="handleAdminFileUpload" class="w-full border p-2 rounded">
                        <div v-if="newTemplate.cover_image_url" class="mt-2 w-32 h-40 bg-gray-100 rounded overflow-hidden">
                            <img :src="newTemplate.cover_image_url" class="w-full h-full object-cover">
                        </div>
                    </div>

                    <!-- 基础信息 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">标题 (Title)</label>
                            <input v-model="newTemplate.title" type="text" class="w-full border p-2 rounded" placeholder="e.g. 森林精灵">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">分类 (Category)</label>
                            <select v-model="newTemplate.category" class="w-full border p-2 rounded">
                                <option v-for="cat in categories.filter(c=>c!=='全部')" :value="cat">{{ cat }}</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1">价格 (Price)</label>
                        <input v-model.number="newTemplate.price" type="number" class="w-full border p-2 rounded">
                    </div>

                    <!-- Prompt 配置 -->
                    <div class="bg-gray-50 p-4 rounded-lg border">
                        <h3 class="font-bold text-gray-700 mb-2">Prompt 配置 (JSON)</h3>
                        
                        <div class="mb-3">
                            <label class="text-xs text-gray-500">Base Prompt (通用画质/光影)</label>
                            <textarea v-model="newTemplate.prompt_config.base_prompt" rows="2" class="w-full border p-2 rounded text-sm"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="text-xs text-gray-500">Variable Prompt (衣服/动作/场景)</label>
                            <textarea v-model="newTemplate.prompt_config.variable_prompt" rows="3" class="w-full border p-2 rounded text-sm"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="text-xs text-gray-500">Negative Prompt (负面词)</label>
                            <textarea v-model="newTemplate.prompt_config.negative_prompt" rows="2" class="w-full border p-2 rounded text-sm"></textarea>
                        </div>
                    </div>

                    <button @click="submitNewTemplate" :disabled="isAdminSubmitting" class="w-full bg-stone-900 text-white py-3 rounded-lg font-bold hover:bg-stone-700 transition">
                        {{ isAdminSubmitting ? '上传中...' : '🚀 上架新模版' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- 4. 等待/结果遮罩层 -->
        <div v-if="processingOrder" class="fixed inset-0 bg-black/90 z-[60] flex flex-col items-center justify-center text-white">
            <div v-if="['PROCESSING','PENDING'].includes(processingOrder.status)" class="text-center">
                <div class="animate-spin text-6xl mb-4">⏳</div>
                <h3 class="text-2xl mb-2">AI 正在绘制...</h3>
                <p class="text-gray-400">预计等待 30 秒</p>
                <div class="w-64 h-2 bg-gray-700 rounded-full mt-6 overflow-hidden relative">
                    <div class="absolute top-0 left-0 h-full bg-yellow-500 animate-[progress_30s_ease-out_forwards] w-full origin-left"></div>
                </div>
            </div>
            <div v-else-if="processingOrder.status === 'COMPLETED'" class="text-center animate-fade-in">
                <h3 class="text-3xl retro-font text-yellow-500 mb-6">✨ 完成!</h3>
                <div class="polaroid w-80 transform rotate-3 scale-110 z-10">
                    <img :src="processingOrder.result_image_url" class="w-full aspect-[3/4] object-cover bg-gray-200">
                    <div class="mt-2 px-2"><a :href="processingOrder.result_image_url" download target="_blank" class="text-blue-600 text-sm font-bold">下载原图</a></div>
                </div>
                <button @click="processingOrder = null" class="mt-10 px-8 py-2 border border-white rounded-full hover:bg-white hover:text-black">关闭</button>
            </div>
            <div v-else-if="processingOrder.status === 'FAILED'" class="text-center">
                <div class="text-6xl mb-4">❌</div>
                <h3>生成失败</h3>
                <button @click="processingOrder = null" class="mt-6 px-8 py-2 border border-white rounded-full">关闭</button>
            </div>
        </div>

    </main>

    <!-- 用户设置模态框 -->
    <div v-if="showUserModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="showUserModal = false">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-4">我的档案</h3>
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 rounded-full bg-gray-200 overflow-hidden mb-2 border-4 border-yellow-500 relative">
                    <img v-if="user.face_image_url" :src="user.face_image_url" class="w-full h-full object-cover">
                    <div v-else class="w-full h-full flex items-center justify-center text-4xl">👤</div>
                </div>
                <p class="text-sm text-gray-500" v-if="!user.face_image_url">⚠️ 请先上传正脸照</p>
            </div>
            
            <div class="mb-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
                <p class="text-sm font-bold">余额: {{ user.credits }} 积分</p>
                <button @click="showTopUpModal = true" class="mt-2 w-full px-4 py-2 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600">
                    💰 充值
                </button>
            </div>
            
            <div class="space-y-3">
                <input type="file" @change="handleUserFileUpload" accept="image/*" class="w-full border p-2 rounded">
                <select v-model="tempGender" class="w-full border p-2 rounded">
                    <option value="female">女 (Female)</option>
                    <option value="male">男 (Male)</option>
                </select>
                <button @click="updateUserFace" :disabled="isUploading" class="w-full bg-stone-900 text-white py-3 rounded-lg font-bold flex justify-center">
                    {{ isUploading ? '上传中...' : '保存档案' }}
                </button>
            </div>
        </div>
    </div>

    <!-- 登录/注册模态框 -->
    <div v-if="showLoginModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="showLoginModal = false">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-4">{{ isRegisterMode ? '注册账号' : '登录账号' }}</h3>
            
            <div class="space-y-3">
                <input v-model="loginForm.email" type="email" placeholder="邮箱" class="w-full border p-2 rounded">
                <input v-model="loginForm.password" type="password" placeholder="密码" class="w-full border p-2 rounded">
                
                <button @click="handleLogin" :disabled="isAuthLoading" class="w-full bg-stone-900 text-white py-3 rounded-lg font-bold">
                    {{ isAuthLoading ? '处理中...' : (isRegisterMode ? '注册' : '登录') }}
                </button>
                
                <button @click="isRegisterMode = !isRegisterMode" class="w-full text-sm text-blue-600 hover:underline">
                    {{ isRegisterMode ? '已有账号？点击登录' : '没有账号？点击注册' }}
                </button>
            </div>
        </div>
    </div>

    <!-- 充值模态框 -->
    <div v-if="showTopUpModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="showTopUpModal = false">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-4">💰 充值积分</h3>
            
            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <button @click="topUpAmount = 50" :class="{'bg-yellow-500 text-white': topUpAmount === 50}" class="border-2 border-yellow-500 p-3 rounded-lg font-bold hover:bg-yellow-100">
                        50积分
                    </button>
                    <button @click="topUpAmount = 100" :class="{'bg-yellow-500 text-white': topUpAmount === 100}" class="border-2 border-yellow-500 p-3 rounded-lg font-bold hover:bg-yellow-100">
                        100积分
                    </button>
                    <button @click="topUpAmount = 200" :class="{'bg-yellow-500 text-white': topUpAmount === 200}" class="border-2 border-yellow-500 p-3 rounded-lg font-bold hover:bg-yellow-100">
                        200积分
                    </button>
                </div>
                
                <input v-model.number="topUpAmount" type="number" placeholder="自定义金额" class="w-full border p-2 rounded">
                
                <button @click="handleTopUp" :disabled="isTopUpLoading" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold hover:bg-green-600">
                    {{ isTopUpLoading ? '充值中...' : `充值 ${topUpAmount} 积分` }}
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    const API_BASE = 'http://localhost:8000/api/v1'; 
    const { createApp, ref, onMounted, reactive, computed } = Vue;

    createApp({
        setup() {
            // State
            const currentView = ref('camera');
            const user = ref({ credits: 0, face_image_url: null, roles: [] });
            const currentCameraPhoto = ref(null);
            const galleryTemplates = ref([]);
            const showUserModal = ref(false);
            const showLoginModal = ref(false);
            const showTopUpModal = ref(false);
            const processingOrder = ref(null);
            const isLoading = ref(false);
            const isUploading = ref(false);
            const isAuthLoading = ref(false);
            const isTopUpLoading = ref(false);
            
            // Auth State
            const isLoggedIn = ref(false);
            const authToken = ref(localStorage.getItem('authToken') || '');
            const isRegisterMode = ref(false);
            const loginForm = reactive({ email: '', password: '' });
            
            // Top-up State
            const topUpAmount = ref(100);
            
            // User Upload
            const userFile = ref(null);
            const tempGender = ref('female');
            
            // Filter
            const categories = ['全部', '复古', '轻奢', '运动', '森系', '职场'];
            const activeCategory = ref('全部');

            // Admin State
            const isAdminSubmitting = ref(false);
            const newTemplate = reactive({
                title: '', category: '复古', price: 9.9, cover_image_url: '',
                prompt_config: { base_prompt: 'High quality, 8k', variable_prompt: '', negative_prompt: 'nsfw, low quality' }
            });

            // Computed
            const isAdmin = computed(() => user.value.roles && user.value.roles.includes('admin'));

            // Configure axios with auth token
            const configureAxios = () => {
                if (authToken.value) {
                    axios.defaults.headers.common['Authorization'] = `Bearer ${authToken.value}`;
                    isLoggedIn.value = true;
                } else {
                    delete axios.defaults.headers.common['Authorization'];
                    isLoggedIn.value = false;
                }
            };

            // --- Auth ---
            const handleLogin = async () => {
                if (!loginForm.email || !loginForm.password) {
                    alert('请填写邮箱和密码');
                    return;
                }
                
                isAuthLoading.value = true;
                try {
                    const endpoint = isRegisterMode.value ? '/auth/register' : '/auth/login';
                    const res = await axios.post(`${API_BASE}${endpoint}`, {
                        email: loginForm.email,
                        password: loginForm.password
                    });
                    
                    authToken.value = res.data.access_token;
                    localStorage.setItem('authToken', authToken.value);
                    user.value = res.data.user;
                    
                    configureAxios();
                    showLoginModal.value = false;
                    loginForm.email = '';
                    loginForm.password = '';
                    
                    alert(isRegisterMode.value ? '注册成功！已赠送100积分' : '登录成功！');
                    loadGallery();
                } catch(e) {
                    alert(e.response?.data?.detail || '登录失败');
                } finally {
                    isAuthLoading.value = false;
                }
            };

            const logout = () => {
                authToken.value = '';
                localStorage.removeItem('authToken');
                user.value = { credits: 0, face_image_url: null, roles: [] };
                isLoggedIn.value = false;
                configureAxios();
                currentView.value = 'camera';
            };

            // --- Top-up ---
            const handleTopUp = async () => {
                if (topUpAmount.value <= 0) {
                    alert('请输入有效的充值金额');
                    return;
                }
                
                isTopUpLoading.value = true;
                try {
                    const res = await axios.post(`${API_BASE}/users/top-up`, {
                        amount: topUpAmount.value
                    });
                    user.value = res.data;
                    showTopUpModal.value = false;
                    alert(`充值成功！已到账${topUpAmount.value}积分`);
                } catch(e) {
                    alert(e.response?.data?.detail || '充值失败');
                } finally {
                    isTopUpLoading.value = false;
                }
            };

            // --- Init ---
            const init = async () => {
                configureAxios();
                
                if (!isLoggedIn.value) {
                    showLoginModal.value = true;
                    return;
                }
                
                try {
                    const res = await axios.get(`${API_BASE}/users/me`);
                    user.value = res.data;
                    tempGender.value = user.value.gender || 'female';
                } catch(e) {
                    console.error("Network Error", e);
                    // 如果token无效，清除并要求重新登录
                    if (e.response?.status === 401) {
                        logout();
                    }
                }
                loadGallery();
            };

            // --- Camera ---
            const triggerCamera = async () => {
                isLoading.value = true;
                try {
                    const res = await axios.get(`${API_BASE}/templates/random`);
                    currentCameraPhoto.value = null;
                    setTimeout(() => { currentCameraPhoto.value = res.data; isLoading.value = false; }, 300);
                } catch(e) { alert("暂无模版"); isLoading.value = false; }
            };

            // --- Order ---
            const createOrder = async (template) => {
                if (!isLoggedIn.value) {
                    showLoginModal.value = true;
                    return;
                }
                
                if (!user.value.face_image_url) { showUserModal.value = true; return; }
                if (user.value.credits < template.price) { 
                    alert("余额不足，请先充值"); 
                    showTopUpModal.value = true;
                    return; 
                }
                if (!confirm(`确认制作？消耗 ${template.price} 积分`)) return;

                try {
                    const res = await axios.post(`${API_BASE}/orders`, { template_id: template.id });
                    user.value.credits -= template.price;
                    processingOrder.value = { ...res.data, template };
                    pollOrder(res.data.id);
                } catch(e) { alert(e.response?.data?.detail || "下单失败"); }
            };

            const pollOrder = async (id) => {
                const interval = setInterval(async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/orders/${id}`);
                        if (processingOrder.value) processingOrder.value.status = res.data.status;
                        if (res.data.status === 'COMPLETED') {
                            processingOrder.value.result_image_url = res.data.result_image_url;
                            clearInterval(interval);
                        } else if (res.data.status === 'FAILED') clearInterval(interval);
                    } catch { clearInterval(interval); }
                }, 3000);
            };

            // --- User Upload ---
            const handleUserFileUpload = (e) => userFile.value = e.target.files[0];
            const updateUserFace = async () => {
                if(!userFile.value) return alert("请选图");
                isUploading.value = true;
                const fd = new FormData();
                fd.append('file', userFile.value);
                fd.append('gender', tempGender.value);
                try {
                    const res = await axios.post(`${API_BASE}/users/face`, fd);
                    user.value.face_image_url = res.data.url;
                    user.value.gender = tempGender.value;
                    showUserModal.value = false;
                    alert("档案更新成功");
                } catch(e) { alert("上传失败"); } 
                finally { isUploading.value = false; }
            };

            // --- Admin Upload ---
            const handleAdminFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fd = new FormData();
                fd.append('file', file);
                try {
                    // 使用新的通用上传接口
                    const res = await axios.post(`${API_BASE}/utils/upload`, fd);
                    newTemplate.cover_image_url = res.data.url;
                } catch(e) { alert("图片上传失败"); }
            };

            const submitNewTemplate = async () => {
                if (!newTemplate.cover_image_url) return alert("请先上传样图");
                isAdminSubmitting.value = true;
                try {
                    await axios.post(`${API_BASE}/admin/templates/`, newTemplate);
                    alert("✅ 上架成功！");
                    // 重置表单
                    newTemplate.title = '';
                    newTemplate.cover_image_url = '';
                    loadGallery(); // 刷新画廊
                } catch(e) { alert("上架失败: " + e.message); } 
                finally { isAdminSubmitting.value = false; }
            };

            // --- Gallery ---
            const loadGallery = async (cat='') => {
                const url = cat && cat!=='全部' ? `${API_BASE}/templates?category=${cat}` : `${API_BASE}/templates`;
                const res = await axios.get(url);
                galleryTemplates.value = res.data;
            };
            const filterCategory = (cat) => { activeCategory.value = cat; loadGallery(cat); };
            const startDrag = () => {};

            onMounted(init);

            return {
                currentView, user, currentCameraPhoto, galleryTemplates, showUserModal, showLoginModal, 
                showTopUpModal, processingOrder, isLoading, isUploading, isAuthLoading, isTopUpLoading,
                tempGender, categories, activeCategory, newTemplate, isAdminSubmitting,
                isLoggedIn, isRegisterMode, loginForm, isAdmin, topUpAmount,
                triggerCamera, createOrder, updateUserFace, handleUserFileUpload, filterCategory, startDrag,
                handleAdminFileUpload, submitNewTemplate, handleLogin, logout, handleTopUp
            };
        }
    }).mount('#app');
</script>
