version: '3.8'

services:
  # 1. 后端 API
  backend:
    build: 
      context: ./backend
    container_name: superstar_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - superstar_static:/app/static  # 图片持久化
    environment:
      - DOMAIN=http://localhost:8000
      - SECRET_KEY=${SECRET_KEY:-CHANGE_THIS_IN_PROD_9s8f7d6f5g4h}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/superstar
      - REDIS_URL=redis://redis:6379/0
    command: sh -c "python scripts/init_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - db
      - redis

  # 2. 异步 Worker
  worker:
    build: 
      context: ./backend
    container_name: superstar_worker
    restart: always
    environment:
      - DOMAIN=http://localhost:8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/superstar
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - superstar_static:/app/static
    depends_on:
      - backend
      - db
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # 3. 数据库
  db:
    image: postgres:15-alpine
    container_name: superstar_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=superstar
    volumes:
      - superstar_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 4. 缓存/队列
  redis:
    image: redis:alpine
    container_name: superstar_redis
    restart: always
    volumes:
      - superstar_redis_data:/data

  # 5. 前端
  frontend:
    build:
      context: ./frontend
    container_name: superstar_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  superstar_static:
  superstar_db_data:
  superstar_redis_data: