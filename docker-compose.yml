version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # 代码热重载
      - ./backend_data/static:/app/static # ✅ 图片持久化
      - ./backend_data/db:/app/db_data    # ✅ 数据库持久化 (如果是 SQLite)
    environment:
      - DATABASE_URL=sqlite:///./db_data/superstar.db # 指向持久化目录
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=superstar_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: